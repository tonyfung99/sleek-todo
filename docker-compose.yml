services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sleek
      POSTGRES_PASSWORD: sleek
      POSTGRES_DB: sleektodo
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sleek -d sleektodo"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://sleek:sleek@postgres:5432/sleektodo
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-only-change-me-0123456789
      CORS_ORIGIN: http://localhost:5173
    ports: ["3000:3000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        # Browser reaches the API via the host-published port.
        VITE_API_URL: http://localhost:3000
    ports: ["5173:80"]
    depends_on:
      - api

volumes:
  pgdata:
